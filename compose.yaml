# Local development only — production runs its own portal-db in the stack.
# Port 5433 so it coexists with moneytrckr's dev Postgres on 5432.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: dev-only
    ports:
      - "5433:5432"
    volumes:
      - portal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal"]
      interval: 3s
      timeout: 3s
      retries: 20

  # logs module (project 07) dev backing store — the image's bundled local
  # config is fine here; prod config lives in infra stacks/observability.
  # Seed fixture logs with: node scripts/seed-local-loki.mjs
  loki:
    image: grafana/loki:3.5.0
    ports:
      - "3100:3100"
    volumes:
      - portal-loki:/loki

volumes:
  portal-pgdata:
  portal-loki:

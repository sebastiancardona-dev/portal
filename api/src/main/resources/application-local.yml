# Local development profile: auto-starts the compose Postgres, seeds an admin and
# points discovery at the checked-in fixtures (no VPS mounts on a dev machine).
# Run: ./mvnw spring-boot:run "-Dspring-boot.run.profiles=local"
spring:
  docker:
    compose:
      enabled: true
      file: ../compose.yaml
      lifecycle-management: start_only   # DB keeps running (and keeps data) across restarts
  datasource:
    password: dev-only

portal:
  deploy:
    # relative to api/ (the spring-boot:run working directory)
    state-dir: ${PORTAL_DEPLOY_STATE_DIR:dev-fixtures/deploy-state}
    log-file: ${PORTAL_DEPLOY_LOG_FILE:dev-fixtures/deploy-log/deploy.log}
  admin:
    email: ${ADMIN_EMAIL:juanse@local.dev}
    password: ${ADMIN_PASSWORD:local-admin-password}

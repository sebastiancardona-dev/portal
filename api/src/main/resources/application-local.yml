# Local development profile: auto-starts the compose Postgres and points discovery
# at the checked-in fixtures (no VPS mounts on a dev machine). Identity: run the
# auth service locally on :9000 (SERVER_PORT=9000, its "local" profile) and register
# a `portal` client against it — see README.
# Run: ./mvnw spring-boot:run "-Dspring-boot.run.profiles=local"
spring:
  docker:
    compose:
      enabled: true
      file: ../compose.yaml
      lifecycle-management: start_only   # DB keeps running (and keeps data) across restarts
  datasource:
    password: dev-only

# plain-http localhost: a Secure cookie would never be sent back
server:
  servlet:
    session:
      cookie:
        secure: false

portal:
  deploy:
    # relative to api/ (the spring-boot:run working directory)
    state-dir: ${PORTAL_DEPLOY_STATE_DIR:dev-fixtures/deploy-state}
    log-file: ${PORTAL_DEPLOY_LOG_FILE:dev-fixtures/deploy-log/deploy.log}

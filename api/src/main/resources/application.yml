spring:
  application:
    name: portal-api
  datasource:
    # 5433 locally to coexist with moneytrckr's dev Postgres on 5432
    url: ${DB_URL:jdbc:postgresql://localhost:5433/portal}
    username: ${DB_USER:portal}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  session:
    jdbc:
      initialize-schema: never   # Flyway owns the DDL (V2)
    timeout: 7d                  # ops console: a working week, not a phone app
  security:
    oauth2:
      client:
        registration:
          ecosystem:
            client-id: ${PORTAL_OIDC_CLIENT_ID:portal}
            client-secret: ${PORTAL_OIDC_CLIENT_SECRET:dev-only}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/ecosystem"
            scope: openid, profile
        provider:
          ecosystem:
            # explicit endpoints (not issuer-uri): no discovery fetch at boot, so the
            # app starts even when the auth service is down
            authorization-uri: ${PORTAL_OIDC_ISSUER:http://localhost:9000}/oauth2/authorize
            token-uri: ${PORTAL_OIDC_ISSUER:http://localhost:9000}/oauth2/token
            jwk-set-uri: ${PORTAL_OIDC_ISSUER:http://localhost:9000}/oauth2/jwks
            user-info-uri: ${PORTAL_OIDC_ISSUER:http://localhost:9000}/userinfo
            user-name-attribute: sub
  docker:
    compose:
      enabled: false   # opt-in via the "local" profile only

management:
  endpoints:
    web:
      # ecosystem contract (docs/OBSERVABILITY.md): every app answers /health and /info
      base-path: /
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true   # surfaces INFO_APP_VERSION / INFO_APP_GIT_SHA / INFO_APP_BUILD_TIME

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework   # behind Traefik: OIDC redirect_uri must be https
  servlet:
    session:
      cookie:
        same-site: lax
        secure: ${PORTAL_COOKIE_SECURE:true}

portal:
  deploy:
    # pipeline 03 artifacts, mounted read-only in prod; optional everywhere
    state-dir: ${PORTAL_DEPLOY_STATE_DIR:/data/deploy/state}
    log-file: ${PORTAL_DEPLOY_LOG_FILE:/data/deploy/log/deploy.log}
  docker:
    # tecnativa docker-socket-proxy (read-only); blank = Docker discovery off
    api: ${DOCKER_API:}
  host:
    proc: ${PORTAL_HOST_PROC:/host/proc}
    # disk stats piggyback on the deploy-state mount (it lives on the VPS root fs)
    # instead of mounting the host root — a root-fs mount would expose every
    # stack's .env secrets to this container. Least privilege by construction.
    disk-path: ${PORTAL_HOST_DISK_PATH:${portal.deploy.state-dir}}
  collect:
    health-interval-ms: ${PORTAL_HEALTH_INTERVAL_MS:30000}
    host-interval-ms: ${PORTAL_HOST_INTERVAL_MS:30000}
    container-interval-ms: ${PORTAL_CONTAINER_INTERVAL_MS:60000}
    initial-delay-ms: ${PORTAL_COLLECT_INITIAL_DELAY_MS:5000}
  retention:
    days: ${PORTAL_RETENTION_DAYS:14}
    cron: ${PORTAL_RETENTION_CRON:0 0 4 * * *}
  # logs module (project 07): blank = pipeline not connected in this environment
  loki:
    url: ${PORTAL_LOKI_URL:}
  # releases module (project 08): blank token = module not connected. Fine-grained
  # read-only PAT (contents: read on ecosystem repos incl. private moneytrckr)
  github:
    token: ${PORTAL_GITHUB_TOKEN:}
    org: ${PORTAL_GITHUB_ORG:sebastiancardona-dev}
    api-url: ${PORTAL_GITHUB_API_URL:https://api.github.com}
    sync-interval-ms: ${PORTAL_GITHUB_SYNC_INTERVAL_MS:600000}
  # identity lives on the auth service (project 05); MoneyTrckr's DESIGN §17 pattern
  oidc:
    issuer: ${PORTAL_OIDC_ISSUER:http://localhost:9000}
  public-url: ${PORTAL_PUBLIC_URL:http://localhost:8080}
